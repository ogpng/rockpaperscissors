<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>


        function getComputerChoice() {
            let num = Math.floor(Math.random() * 3);

            if (num == 0) return "rock";
            else if (num == 1) return "paper";
            else return "scissors";
        }

        function getHumanChoice() {
          reply = prompt("What's your move?");
          return reply.toLowerCase();
        }

        function playRound(humanChoice, computerChoice) {
            switch(humanChoice) {
                case "rock":
                    if (computerChoice === "paper") { console.log("You lose."); computerScore++; }
                    else if (computerChoice==="scissors") { console.log("You win."); humanScore++; }
                    else console.log("It's a tie.");
                    break;
                case "paper":
                    if (computerChoice === "paper") console.log("It's a tie.")
                    else if (computerChoice==="scissors") { console.log("You lose."); computerScore++; }
                    else  { console.log("You win."); humanScore++; }
                    break;
                case "scissors":
                    if (computerChoice === "paper")  { console.log("You win."); humanScore++; }
                    else if (computerChoice==="scissors") console.log("It's a tie.")
                    else { console.log("You lose."); computerScore++; }
                    break;
                default:
                    console.log("huh?")
            }
        }

        function playGame() {
            

            for (let i = 0; i < 5; i++) {
                
                const humanSelection = getHumanChoice();
                const computerSelection = getComputerChoice();
                
                playRound(humanSelection, computerSelection);
                console.log("ROUND" + (i+1) + ": " + humanScore + " to " + computerScore);
            }

        }
        let humanScore = 0;
            let computerScore = 0;
        playGame();
        
    </script>


</body>
</html>
